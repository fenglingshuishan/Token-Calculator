name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: python -m pip install -e '.[dev]'
      - name: Python tests
        run: pytest
      - name: Frontend syntax
        run: node --check frontend/js/app.js
      - name: Build distributions
        if: matrix.python-version == '3.12'
        run: |
          python -m pip install build
          python -m build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build container
        run: docker build -t token-calculator:ci .
      - name: Smoke-test container
        run: |
          docker run --rm -d --name token-calculator-ci -p 18000:8000 token-calculator:ci
          for attempt in {1..30}; do
            curl --fail --silent http://127.0.0.1:18000/health && exit 0
            sleep 1
          done
          docker logs token-calculator-ci
          exit 1
      - name: Stop container
        if: always()
        run: docker rm -f token-calculator-ci >/dev/null 2>&1 || true
